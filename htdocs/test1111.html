<script>

// This function is correct
function ClosestGH (gh,h_F) {
    var diff_prev = 10000000;
	var closet = 0;
    for (var i = 0; i < gh.length; i++) 
	{
		var curr = gh[i];
		var diff_curr = Math.abs(h_F-curr);
		if (diff_curr < diff_prev)
		{
			diff_prev = diff_curr;
			closest = gh[i];	
		}
    };
	if (closest == 0)
	{
		var h_API = "surface";
	}
	else
	{
		var h_API = closest.toString().concat('h');
	}
    return h_API
}

// Get weather data
// coord_all: contain 1 pair of coordinates of a flightline
// h_API: height of flightline
// s: a variable to store suitability score
// length: the number is 3 for now, corresponding to start, end and mid points of a flightline
// obj: the json for current flightline
async function API (coord_all,h_API,s,index,length,obj,flag,callback)
{
	var result;
	var score_temp = 0;
	var data = JSON.stringify({"lat": coord_all[0],
    "lon": coord_all[1],
    "model": "gfs",
    "parameters": ["wind", "precip", "temp", "lclouds"],
    "levels": ["surface", h_API],
    "key": "4gzQ7YBNf3FnXc1jG3SsqyASc22SgZJA"});
	
	var xhr = new XMLHttpRequest();
	var url = "https://api.windy.com/api/point-forecast/v2";
	var result;
	xhr.onreadystatechange = function () {
		if (this.readyState === 4 && this.status === 200) 
		{
			result = JSON.parse(this.responseText);
			// callback(result,h_API,s,index,length,obj,flag);
			//console.log("here",result,flag,coord_all[0],coord_all[1],obj);
			//console.log("state is " + xhr.readyState);
			//console.log(new Date(result.ts[0]));
			//console.log(new Date(result.ts[1]));
			
		}
		//console.log("done");
	}
	xhr.open("POST", url, false);
	xhr.setRequestHeader("Content-Type", "application/json");
	xhr.send(data);
	//console.log("state is " + xhr.readyState);
	return result;
	
}

// Some data manipulation to apply a math model to get suitability score
// Not used for now, moved to main loop already
function mycallback(result,h_API,s,index,length,obj,flag) {
   console.log(result);

   // Precip, boolean, if it rains, wind speed too high, cloud coverage too thick, do not fly
   // Score = 0, not suitable
	var u = 'wind_u-'.concat(h_API);
	var v = 'wind_v-'.concat(h_API);
	var wind = Math.sqrt(result[u][1]*result[u][1]+result[v][1]*result[v][1]);
	if (result["past3hprecip-surface"][1] == 0 || wind>5 || result["lclouds-surface"][1]>100)
	{
		s[index] = 0;
		console.log("Not suitable");
	}
	// If not in extreme conditions, remap wind and cloud coverage data into defined intervals
	// Wind, 0.5 one level, cloud, 10 one level
	else
	{
		var score_wind = remap(10, wind, 0, 5);
		var score_cloud = remap(10, result["lclouds-surface"][1], 0, 100);
		
		s[index] = (score_wind*0.7+score_cloud*0.3);
		console.log("suitable");
		console.log(s,s.length);
	}
	

	if (flag==length)
	{
		var prod = 1;
		var sum = 0;
		for(var i = 0; i < length; i++)
		{
			// Calculate product for all three scores, if equal to 0, at least one element is 0
			// indicating extreme conditions, do not fly
			prod = prod*s[i];
			// Calculate sum for all three scores
			sum = sum+s[i]
		}
		
		// Calculate average of suitability scores
		var avg = sum/length;
		//console.log(prod,avg,s.length);
		
		// if not suitable, draw flight lines in red

			"color": "#FF3333",
			"weight": 1,
			"opacity": 0.65
			};
			
			L.geoJSON(obj, {
			style: myStyle
			}).addTo(mymap);
		}
		// if suitable, draw flight lines in blue
		else
		{
			var myStyle = {
			"color": "#3733FF",
			"weight": 1,
			"opacity": 0.65
			};
			L.geoJSON(obj, {
			style: myStyle
			}).addTo(mymap);
		}
		console.log("one line done");
	}
}

// This function is correct
function remap(interval,data,begin,end)
{
	var score = 0;
	var stepsize = (end-begin)/interval;
	for(var i = 0; i < interval+1; i++)
	{
		var curr = begin;
		
		if ((data - begin)>stepsize)
		{
			begin = begin + stepsize;
		}	
		else
		{
			score = 10-i;
			//console.log(data,i,score, begin,stepsize);
			break;
		}
		if (data > end)
		{
			score = 0;
		}	
	}
	
	return score;
}
