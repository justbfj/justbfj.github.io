			}

				console.log(disp);

	var x = document.getElementById("Popup")
	x.innerHTML = str;
	console.log(x.style.display);
    x.style.display = "block";
	
	
	
});

}



// Get weather data
// coord_all: contain 1 pair of coordinates of a flightline
// h_API: height of flightline
// s: a variable to store suitability score
// length: the number is 3 for now, corresponding to start, end and mid points of a flightline
// obj: the json for current flightline
async function API (coord_all,s,index,length,obj)
{
	
	var result;
	var score_temp = 0;
	var lon = coord_all[0];
	var lat = coord_all[1];
	var part = "hourly&daily";
	var API_key = '6c16d443365de5b88e4b4630d15c74f5';
	var xhr = new XMLHttpRequest();
	// Daily??
	var url = 'https://api.openweathermap.org/data/2.5/onecall?lat='+encodeURIComponent(lat)+'&lon='+encodeURIComponent(lon)+'&exclude='+encodeURIComponent(part)+'&appid=6c16d443365de5b88e4b4630d15c74f5';
	var result;
	xhr.onreadystatechange = function () {
		if (this.readyState === 4 && this.status === 200) 
		{
			result = JSON.parse(this.responseText);
			// callback(result,h_API,s,index,length,obj,flag);			
		}
	}
	xhr.open("GET", url, false);
	// xhr.setRequestHeader("Content-Type", "application/json");
	xhr.send();
	return result;
	
}


// This function is correct
function remap(interval,data,begin,end)
{
	var score = 0;
	var stepsize = (end-begin)/interval;
	for(var i = 0; i < interval+1; i++)
	{
		var curr = begin;
		
		if ((data - begin)>stepsize)
		{
			begin = begin + stepsize;
		}	
		else
		{
			score = 10-i;
			//console.log(data,i,score, begin,stepsize);
			break;
		}
		if (data > end)
		{
			score = 0;
		}	
	}
	
	return score;
}
